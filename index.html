<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認識網路(3)：網域名稱、網路服務應用</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FFF5F7;
        }
        .macaron-pink { background-color: #FFB7C5; }
        .macaron-light { background-color: #FFE4E1; }
        .macaron-text { color: #D87093; }
        .passed-circle { background-color: #FFB7C5; color: white; cursor: default; }
        .draggable { cursor: grab; transition: transform 0.2s; }
        .draggable:active { cursor: grabbing; }
        
        .option-card.selected {
            border-color: #FFB7C5;
            background-color: #FFF0F5;
            transform: scale(1.01);
        }

        /* 拖曳填空框樣式 */
        .fill-slot {
            min-width: 100px;
            height: 36px;
            border-bottom: 2px dashed #FFB7C5;
            background-color: #FFF0F5;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            vertical-align: middle;
            border-radius: 8px;
            transition: all 0.3s;
            overflow: visible;
        }

        /* 答案框 Slot 樣式 (針對流程配對) */
        .flow-slot-box {
            width: 150px;
            height: 100px;
            background-color: #F9FAFB;
            border: 2px dashed #E5E7EB;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 8px;
            transition: background-color 0.2s;
        }

        /* 分類題型的 Slot */
        .category-slot-box {
            min-height: 160px;
            background-color: #F9FAFB;
            border: 2px dashed #E5E7EB;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: 20px 10px 10px 10px;
            transition: background-color 0.2s;
        }

        .slot .draggable {
            margin: 4px;
            font-size: 0.9rem;
            padding: 4px 10px;
            box-shadow: none;
            width: auto;
            text-align: center;
        }

        @keyframes successPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .success-animate { animation: successPop 0.5s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <header class="w-full max-w-4xl bg-white rounded-3xl shadow-sm p-6 mb-6 flex flex-col md:flex-row justify-between items-center border border-pink-100">
        <div>
            <h1 class="text-2xl font-bold macaron-text">認識網路(3)</h1>
            <p class="text-gray-500 text-sm">網域名稱、網路服務應用</p>
        </div>
        <div id="progress-container" class="flex space-x-2 mt-4 md:mt-0 flex-wrap justify-center">
        </div>
    </header>

    <!-- Main Quiz Area -->
    <main id="quiz-container" class="w-full max-w-4xl bg-white rounded-3xl shadow-md p-8 min-h-[550px] flex flex-col relative border border-pink-50">
        <div id="question-content" class="flex-grow">
        </div>

        <!-- Footer -->
        <div id="quiz-footer" class="mt-8 flex justify-between items-center border-t border-pink-50 pt-6">
            <div id="status-msg" class="text-pink-400 font-medium"></div>
            <button id="check-btn" class="macaron-pink text-white px-8 py-3 rounded-2xl font-bold hover:opacity-90 transition-all shadow-md">
                檢查答案
            </button>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-30 hidden items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full shadow-2xl text-center">
            <div class="text-4xl mb-4">⚠️</div>
            <p id="modal-text" class="text-gray-700 mb-6 font-medium"></p>
            <button onclick="closeModal()" class="w-full py-3 bg-gray-100 text-gray-600 rounded-2xl font-bold hover:bg-gray-200 transition-colors">我知道了</button>
        </div>
    </div>

    <!-- Success Overlay -->
    <div id="success-overlay" class="fixed inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300 z-40">
        <div class="bg-white bg-opacity-90 p-10 rounded-full shadow-2xl scale-0 transition-transform duration-500">
            <span class="text-6xl">🌸</span>
        </div>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbyWwAxUvldPxAAX75f0n6D4_pL5rvnEdxthdHYfpFXydwBtoP44f4Dzq61Dne6BnZ7J/exec";
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'net3-quiz-final';
        
        const questions = [
            { type: 1, title: "網域名稱服務（DNS）是為了解決哪一個問題而產生的？", options: ["IP 位址是一長串數字，不容易記憶", "網路傳送的速度太慢，需要加速", "防止駭客入侵電腦，保護資訊安全", "讓電子郵件可以更快速地傳送到對方手中"], answer: "IP 位址是一長串數字，不容易記憶", shuffleOnWrong: true, randomOrder: true },
            { type: 3, title: "請依網域名稱的組成結構順序排列（由左至右）", flow: ["第一層", "第二層", "第三層", "第四層"], items: [{ id: 'A', text: '主機名稱' }, { id: 'B', text: '機構名稱' }, { id: 'C', text: '類別名稱' }, { id: 'D', text: '地區名稱' }], answer: { '第一層': 'A', '第二層': 'B', '第三層': 'C', '第四層': 'D' }, randomOrder: true },
            { type: 1, title: "網域名稱的哪一個部份，是由使用者管理，並且可以根據自己的組織架構，再畫分一組以上的網域名稱？", options: ["主機名稱（如 www）", "機構名稱（如 kfjh）", "類別名稱（如 edu）", "地區名稱（如 tw）"], answer: "機構名稱（如 kfjh）", shuffleOnWrong: true, randomOrder: true },
            { type: 1, title: "網域名稱是由多組名稱所組合而成的，而各個名稱之間的分隔是採用下列何種符號？", options: ["點（.）", "冒號（:）", "分號（;）", "逗號（,）"], answer: "點（.）", shuffleOnWrong: true, randomOrder: true },
            { type: 11, title: "網域名稱中，有哪些類別名稱不是一般人可以申請的？", hint: "（本題為複選題，請選出所有正確答案）", options: ["com", "org", "edu", "gov"], answer: ["edu", "gov"], shuffleOnWrong: true, randomOrder: true },
            { type: 1, title: "網域名稱中，如果網址沒有最後面的國碼（例如：.tw、.jp），請問這個網址通常是在哪個國家申請的？", options: ["英國", "美國", "中國", "日本"], answer: "美國", shuffleOnWrong: true, randomOrder: true },
            { type: 4, title: "請配對以下的網域類別：", categories: [{ id: 'C', name: '政府機關' }, { id: 'D', name: '財團法人或非營利組織' }, { id: 'A', name: '商業機構' }, { id: 'B', name: '教育機構' }], items: [{ id: 'Gov', target: 'C' }, { id: 'Org', target: 'D' }, { id: 'Com', target: 'A' }, { id: 'Edu', target: 'B' }], randomOrder: true },
            { type: 1, title: "詐騙集團利用短網址進行詐騙，請問他們可以針對網域名稱的哪一個部分來進行詐騙？", options: ["主機名稱（如 www）", "機構名稱（如 kfjh）", "類別名稱（如 edu）", "地區名稱（如 tw）"], answer: "機構名稱（如 kfjh）", shuffleOnWrong: true, randomOrder: true },
            { type: 11, title: "網址的詐騙中，常會利用一些比較容易混淆的數字或字母。請問有哪些英文字母或數字比較容易被混淆，當成詐騙的網址？", hint: "（複選題，請選出兩個正確答案）", options: ["數字「0」與大寫英文字母「O」", "小寫英文字母「l」與大寫英文字母「I」", "大寫英文字母「A」與大寫英文字母「V」", "數字「7」與大寫英文字母「T」"], answer: ["數字「0」與大寫英文字母「O」", "小寫英文字母「l」與大寫英文字母「I」"], shuffleOnWrong: true, randomOrder: true },
            { type: 4, title: "請根據「即時通訊（如 LINE）」與「電子郵件（如 Gmail）」的特性進行分類：", categories: [{ id: 'A', name: '分類 A：即時通訊' }, { id: 'B', name: '分類 B：電子郵件' }], items: [{ id: '能得知對方是否已讀訊息', target: 'A' }, { id: '檔案存放於伺服器中，無下載期限', target: 'B' }, { id: '訊息較零散，不易查找討論事項', target: 'A' }, { id: '內容可同步寄送給多位收件者，並可設定「秘密收件者」', target: 'B' }], randomOrder: true },
            { type: 3, title: "請將下列網路服務與技術名詞，配對到正確的定義描述：", flow: ["網域名稱 (A)", "物聯網 (B)", "全球資訊網服務 (C)", "電子郵件 (D)"], items: [{ id: 'IoT', text: 'IoT' }, { id: 'Domain Name', text: 'Domain Name' }, { id: 'WWW', text: 'WWW' }, { id: 'Email', text: 'Email' }], answer: { '網域名稱 (A)': 'Domain Name', '物聯網 (B)': 'IoT', '全球資訊網服務 (C)': 'WWW', '電子郵件 (D)': 'Email' }, randomOrder: true },
            { type: 2, title: "請完成關於全球資訊網（WWW）的描述：", content: "使用者必須打開[網頁瀏覽器]，才能連接上全球資訊網觀看各種多媒體資訊，而全球資訊網是使用[超文件傳輸協定]來傳遞資料，而網頁內容是使用[超文件標示語言]來呈現。", randomOrder: true }
        ];

        let currentIdx = 0;
        let attempts = Array(questions.length).fill(0);
        let passed = Array(questions.length).fill(false);
        let challengeCount = 1;
        let startTime = new Date();
        let studentId = generateId();
        const quotes = ["科技始終來自於人性，也服務於人性。", "學習是通往數位未來的唯一鑰匙。", "DNS 是網際網路的電話簿，讓世界變簡單。", "每一個位元都承載著創新的力量。", "掌握網域結構，就是掌握數位版圖。", "網路縮短了距離，智慧拉近了未來。", "別怕出錯，每一次點擊都是進化的機會。", "持續探索，你是未來網路的原住民。", "成功的關鍵在於：不停止尋找答案。"];

        function generateId() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const now = new Date();
            return `H${letters[Math.floor(Math.random()*26)]}${Math.floor(Math.random()*10)}-${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}.${String(now.getMinutes()).padStart(2,'0')}`;
        }

        function init() {
            renderProgress();
            renderQuestion();
            const btn = document.getElementById('check-btn');
            if (btn) btn.onclick = handleCheck;
        }

        function renderProgress() {
            const container = document.getElementById('progress-container');
            if (!container) return;
            container.innerHTML = '';
            questions.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `w-10 h-10 rounded-full flex items-center justify-center font-bold transition-all border-2 mb-2 ${i === currentIdx ? 'border-pink-400 text-pink-500 scale-110' : 'border-pink-100 text-gray-300'}`;
                if (passed[i]) { dot.classList.add('passed-circle'); dot.innerHTML = '✓'; }
                else { dot.innerHTML = i + 1; dot.style.cursor = 'pointer'; dot.onclick = () => { if (currentIdx !== i) { if (!passed[currentIdx]) showModal("請先完成目前的題目並點擊「檢查答案」！"); else switchQuestion(i); } }; }
                container.appendChild(dot);
            });
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const content = document.getElementById('question-content');
            const checkBtn = document.getElementById('check-btn');
            if (!content) return;
            if (checkBtn) checkBtn.innerText = (currentIdx === questions.length - 1) ? "查看結果" : "檢查答案";

            content.innerHTML = `<h2 class="text-xl font-bold mb-2 text-gray-700 flex items-start"><span class="macaron-pink text-white w-8 h-8 rounded-lg inline-flex items-center justify-center mr-3 flex-shrink-0">Q</span>${q.title}</h2>${q.hint ? `<p class="text-blue-500 text-sm mb-6 ml-11"><i class="fas fa-info-circle mr-1"></i>${q.hint}</p>` : '<div class="mb-6"></div>'}`;

            if (q.type === 1 || q.type === 11) {
                let opts = [...q.options]; if (q.randomOrder) opts.sort(() => Math.random() - 0.5);
                const grid = document.createElement('div'); grid.className = "space-y-4 ml-11";
                const colors = ['bg-pink-50', 'bg-blue-50', 'bg-yellow-50', 'bg-green-50'];
                
                // 設定形狀：單選圓形，複選方框
                const markerShape = q.type === 1 ? "rounded-full" : "rounded";

                opts.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "option-card w-full text-left p-5 rounded-2xl border-2 border-transparent transition-all flex items-center hover:shadow-md " + colors[idx % 4];
                    btn.innerHTML = `
                        <div class="w-6 h-6 ${markerShape} border-2 border-pink-200 mr-4 flex-shrink-0 flex items-center justify-center check-mark">
                            <i class="fas fa-check text-white text-xs opacity-0"></i>
                        </div>
                        <span class="text-gray-700 font-medium">${opt}</span>`;
                    
                    btn.onclick = () => {
                        if (q.type === 1) { 
                            grid.querySelectorAll('.option-card').forEach(b => { 
                                b.classList.remove('selected', 'border-pink-400', 'bg-white'); 
                                b.querySelector('.check-mark').classList.remove('macaron-pink'); 
                                b.querySelector('i').classList.add('opacity-0'); 
                            }); 
                        }
                        btn.classList.toggle('selected'); 
                        btn.classList.toggle('border-pink-400'); 
                        btn.classList.toggle('bg-white'); 
                        btn.querySelector('.check-mark').classList.toggle('macaron-pink'); 
                        btn.querySelector('i').classList.toggle('opacity-0');
                    };
                    grid.appendChild(btn);
                });
                content.appendChild(grid);
            } 
            else if (q.type === 2) {
                const wrapper = document.createElement('div'); wrapper.className = "ml-11 flex flex-col items-center";
                const sentenceWrapper = document.createElement('div'); sentenceWrapper.className = "text-xl leading-[4rem] text-gray-700 bg-white p-6 rounded-3xl border border-pink-100 shadow-sm";
                const parts = q.content.split(/(\[.*?\])/);
                const answers = [];
                parts.forEach(part => {
                    if (part.startsWith('[') && part.endsWith(']')) {
                        const ans = part.substring(1, part.length - 1); answers.push(ans);
                        const slot = document.createElement('div'); slot.className = "fill-slot slot"; slot.dataset.answer = ans;
                        slot.ondragover = e => e.preventDefault();
                        slot.ondrop = e => handleDrop(e, slot, false);
                        sentenceWrapper.appendChild(slot);
                    } else { sentenceWrapper.appendChild(document.createTextNode(part)); }
                });
                wrapper.appendChild(sentenceWrapper);
                const itemContainer = createItemSource(answers); wrapper.appendChild(itemContainer);
                content.appendChild(wrapper);
            }
            else if (q.type === 3) {
                const wrapper = document.createElement('div'); wrapper.className = "flex flex-col space-y-12 items-center mt-6 ml-11";
                const slotContainer = document.createElement('div'); slotContainer.className = "flex flex-row flex-wrap justify-center gap-4 w-full";
                q.flow.forEach(step => {
                    const box = document.createElement('div'); box.className = "flow-slot-box";
                    box.innerHTML = `<span class="absolute -top-3 bg-gray-400 text-white px-3 py-0.5 rounded-full text-xs">${step}</span><div class="slot w-full h-full flex items-center justify-center text-gray-400 text-xs text-center" data-cat-id="${step}">置於此處</div>`;
                    const slot = box.querySelector('.slot');
                    box.ondragover = e => e.preventDefault(); box.ondrop = e => handleDrop(e, slot, false);
                    slotContainer.appendChild(box);
                });
                const itemContainer = createItemSource(q.items.map(i => i.id), q.items);
                wrapper.appendChild(slotContainer); wrapper.appendChild(itemContainer); content.appendChild(wrapper);
            }
            else if (q.type === 4) {
                const wrapper = document.createElement('div'); wrapper.className = "flex flex-col space-y-12 items-center mt-6 ml-11";
                const slotContainer = document.createElement('div'); slotContainer.className = "grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl";
                q.categories.forEach(cat => {
                    const box = document.createElement('div'); box.className = "category-slot-box";
                    box.innerHTML = `<span class="absolute -top-3 left-4 bg-gray-400 text-white px-3 py-0.5 rounded-full text-xs">${cat.name}</span><div class="slot w-full h-full flex flex-wrap items-start justify-center text-gray-400 text-sm mt-2" data-cat-id="${cat.id}">置於此處</div>`;
                    const slot = box.querySelector('.slot');
                    box.ondragover = e => e.preventDefault(); box.ondrop = e => handleDrop(e, slot, true);
                    slotContainer.appendChild(box);
                });
                const itemContainer = createItemSource(q.items.map(i => i.id), q.items);
                wrapper.appendChild(slotContainer); wrapper.appendChild(itemContainer); content.appendChild(wrapper);
            }
        }

        function handleDrop(e, slot, allowMultiple) {
            e.preventDefault();
            const elId = e.dataTransfer.getData('text');
            const draggedEl = document.getElementById(elId);
            if (!draggedEl) return;
            const itemSource = document.getElementById('item-source');
            if (!allowMultiple && slot.querySelector('.draggable')) {
                const existing = slot.querySelector('.draggable');
                if (existing) { itemSource.appendChild(existing); }
            }
            if (slot.innerText.trim() === '置於此處') { slot.innerHTML = ''; }
            slot.appendChild(draggedEl);
        }

        function createItemSource(ids, originalItems = null) {
            const container = document.createElement('div');
            container.id = "item-source";
            container.className = "flex flex-wrap justify-center gap-4 p-6 bg-pink-50 rounded-3xl w-full min-h-[100px] mt-8";
            container.ondragover = e => e.preventDefault();
            container.ondrop = e => {
                e.preventDefault();
                const elId = e.dataTransfer.getData('text');
                const el = document.getElementById(elId);
                if (el) container.appendChild(el);
                document.querySelectorAll('.slot').forEach(s => { if (s.children.length === 0 && !s.classList.contains('fill-slot')) s.innerText = '置於此處'; });
            };
            let list = [...ids]; list.sort(() => Math.random() - 0.5);
            list.forEach((id, i) => {
                const el = document.createElement('div');
                el.id = `drag-q${currentIdx}-${i}`;
                el.draggable = true;
                el.className = "draggable macaron-light px-4 py-2 rounded-xl shadow-sm text-pink-700 font-bold border border-white text-sm";
                let displayText = id;
                if (originalItems) {
                    const item = originalItems.find(it => it.id === id);
                    if (item && item.text) displayText = item.text;
                    if (item && item.target) el.dataset.target = item.target;
                }
                el.innerText = displayText;
                el.dataset.id = id;
                el.ondragstart = e => e.dataTransfer.setData('text', el.id);
                container.appendChild(el);
            });
            return container;
        }

        function handleCheck() {
            const q = questions[currentIdx]; let isCorrect = false; attempts[currentIdx]++;
            if (q.type === 1 || q.type === 11) {
                const sel = Array.from(document.querySelectorAll('.option-card.selected')).map(el => el.querySelector('span').innerText);
                if (sel.length === 0) return showModal("請先選擇答案！");
                isCorrect = (q.type === 1) ? (sel[0] === q.answer) : (sel.length === q.answer.length && q.answer.every(a => sel.includes(a)));
            } else if (q.type === 2) {
                const slots = document.querySelectorAll('.fill-slot');
                if (Array.from(slots).some(s => s.children.length === 0)) return showModal("請將所有空格填滿！");
                isCorrect = Array.from(slots).every(s => s.dataset.answer === s.querySelector('.draggable').dataset.id);
            } else if (q.type === 3 || q.type === 4) {
                const slots = document.querySelectorAll('.slot:not(.fill-slot)');
                const draggables = document.querySelectorAll('.draggable');
                const placed = document.querySelectorAll('.slot .draggable');
                if (placed.length < draggables.length) return showModal("請將所有標籤拖曳到對應位置！");
                isCorrect = true;
                slots.forEach(slot => {
                    const catId = slot.dataset.catId; const items = slot.querySelectorAll('.draggable');
                    if (q.type === 3) { const item = items[0]; if (!item || q.answer[catId] !== item.dataset.id) isCorrect = false; }
                    else { items.forEach(it => { if (it.dataset.target !== catId) isCorrect = false; }); if (items.length !== q.items.filter(it => it.target === catId).length) isCorrect = false; }
                });
            }
            if (isCorrect) { passed[currentIdx] = true; showSuccess(); }
            else { document.getElementById('status-msg').innerText = "❌ 答案不完全正確，再試一次！"; setTimeout(() => { document.getElementById('status-msg').innerText = ""; }, 2000); if (q.shuffleOnWrong) renderQuestion(); }
        }

        function showSuccess() {
            const over = document.getElementById('success-overlay'); const box = over.querySelector('div');
            over.classList.remove('opacity-0'); box.classList.replace('scale-0', 'scale-100');
            setTimeout(() => { over.classList.add('opacity-0'); box.classList.replace('scale-100', 'scale-0'); if (currentIdx < questions.length - 1) switchQuestion(currentIdx + 1); else renderResult(); }, 600);
        }

        function switchQuestion(idx) { currentIdx = idx; renderProgress(); renderQuestion(); }

        function renderResult() {
            const time = Math.floor((new Date() - startTime) / 1000);
            const content = document.getElementById('question-content'); document.getElementById('quiz-footer').classList.add('hidden');
            content.innerHTML = `<div class="text-center py-10"><div class="text-6xl mb-6">🏆</div><h2 class="text-3xl font-bold macaron-text mb-2">挑戰成功！</h2><p class="text-gray-500 mb-8">測驗編號：${studentId}</p><div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-10"><div class="bg-pink-50 p-6 rounded-3xl"><p class="text-xs text-pink-400">總耗時</p><p class="text-2xl font-bold">${time}s</p></div><div class="bg-blue-50 p-6 rounded-3xl"><p class="text-xs text-blue-400">挑戰次數</p><p class="text-2xl font-bold">${challengeCount}</p></div></div><div class="bg-gray-50 p-6 rounded-3xl italic text-gray-600 mb-10 mx-11">"${quotes[Math.floor(Math.random()*quotes.length)]}"</div><button onclick="restartQuiz()" class="bg-gray-100 px-12 py-4 rounded-2xl font-bold hover:bg-gray-200">重新挑戰</button></div>`;
            syncToGas(time);
        }

        async function syncToGas(duration) {
            const attemptsDetail = attempts.join(',');
            const score = Math.round((passed.filter(p => p).length / questions.length) * 100);
            const data = { date: new Date().toLocaleString('zh-TW'), id: studentId, challenges: challengeCount, duration: duration + "秒", attemptsDetail: attemptsDetail, totalScore: score };
            let retries = 5; let delay = 1000;
            while (retries > 0) {
                try { await fetch(gasUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); break; } 
                catch (e) { retries--; if (retries === 0) break; await new Promise(r => setTimeout(r, delay)); delay *= 2; }
            }
        }

        function restartQuiz() { challengeCount++; currentIdx = 0; passed.fill(false); attempts.fill(0); startTime = new Date(); init(); }
        function showModal(t) { document.getElementById('modal-text').innerText = t; document.getElementById('modal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }

        window.onload = init;
    </script>
</body>
</html>
